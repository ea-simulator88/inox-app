<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hộ Kinh Doanh Hàng Gia Dụng - Quản lý kho</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
#app { max-width: 420px; margin: 0 auto; padding: 1rem; min-height: 100vh; }
.screen { display: none; }
.screen.active { display: block; }

/* Logo */
.logo { text-align: center; padding: 2.5rem 0 2rem; }
.logo-title { font-size: 24px; font-weight: 600; color: #1a1a1a; }
.logo-sub { font-size: 14px; color: #888; margin-top: 6px; }

/* Card */
.card { background: #fff; border: 1px solid #e8e8e8; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }

/* Form elements */
label { font-size: 13px; color: #888; display: block; margin-bottom: 6px; margin-top: 12px; }
label:first-child { margin-top: 0; }
input, select { width: 100%; padding: 11px 14px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; color: #1a1a1a; background: #fafafa; outline: none; }
input:focus, select:focus { border-color: #4CAF50; background: #fff; }

/* Buttons */
.btn-primary { width: 100%; padding: 14px; background: #4CAF50; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }
.btn-primary:active { opacity: 0.85; }
.btn-scan { width: 100%; padding: 18px; background: #e8f5e9; color: #2e7d32; border: 1.5px solid #a5d6a7; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-scan:active { opacity: 0.85; }
.btn-back { background: none; border: none; color: #888; font-size: 14px; cursor: pointer; padding: 0; }
.btn-confirm { width: 100%; padding: 16px; background: #4CAF50; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.btn-confirm.xuat { background: #f44336; }
.btn-confirm:active { opacity: 0.85; }
.btn-secondary { width: 100%; padding: 12px; background: #fff; color: #555; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; cursor: pointer; margin-top: 8px; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-top: 0.5rem; }
.header-title { font-size: 18px; font-weight: 600; }

/* Badge */
.badge { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
.badge-owner { background: #fff3e0; color: #e65100; }
.badge-staff { background: #e3f2fd; color: #1565c0; }

/* Product info */
.product-name { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
.product-size { font-size: 13px; color: #888; margin-bottom: 1rem; }
.info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: #888; }
.info-value { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.info-value.red { color: #f44336; }
.info-value.green { color: #4CAF50; }

/* Toggle */
.toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
.toggle-btn { flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; border: 1.5px solid #e0e0e0; background: #fafafa; color: #888; }
.toggle-btn.active-xuat { background: #ffebee; color: #c62828; border-color: #ef9a9a; }
.toggle-btn.active-nhap { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }

/* Success */
.success-wrap { text-align: center; padding: 2.5rem 0 1.5rem; }
.success-circle { width: 72px; height: 72px; border-radius: 50%; background: #e8f5e9; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
.success-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.success-sub { font-size: 13px; color: #888; }

/* Error */
.error-msg { font-size: 13px; color: #f44336; margin-top: 6px; display: none; }

/* Video */
#video-container { display: none; margin-bottom: 1rem; border-radius: 14px; overflow: hidden; }
.scan-hint { text-align: center; font-size: 13px; color: #888; margin-bottom: 12px; }

/* Manual input */
.divider { text-align: center; font-size: 12px; color: #bbb; margin: 14px 0; }
.manual-row { display: flex; gap: 8px; }
.manual-row input { margin-bottom: 0; flex: 1; }
.manual-row button { padding: 11px 18px; background: #1565c0; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }

/* Logout */
.logout-btn { font-size: 12px; color: #aaa; background: none; border: none; cursor: pointer; }

/* Loading */
.loading { text-align: center; font-size: 14px; color: #888; padding: 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Product list */
.product-item { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.product-item:active { background: #f0f0f0; }
.product-item-left { flex: 1; }
.product-item-ma { font-size: 12px; color: #888; margin-bottom: 2px; }
.product-item-ten { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.product-item-size { font-size: 12px; color: #aaa; margin-top: 2px; }
.product-item-right { text-align: right; }
.product-item-tonkho { font-size: 14px; font-weight: 600; color: #4CAF50; }
.product-item-tonkho.low { color: #f44336; }
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="logo">
    <div class="logo-title">🏪 Hộ Kinh Doanh Hàng Gia Dụng</div>
    <div class="logo-sub">Quản lý xuất nhập kho</div>
  </div>
  <div class="card">
    <label>Tài khoản</label>
    <select id="login-role">
      <option value="owner">👑 Admin</option>
      <option value="staff">👷 Staff</option>
    </select>
    <label>Mật khẩu</label>
    <input type="password" id="login-pass" placeholder="Nhập mật khẩu..." />
    <div class="error-msg" id="login-error">❌ Sai mật khẩu, thử lại!</div>
    <button class="btn-primary" onclick="doLogin()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:6px;margin-bottom:2px;"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Đăng nhập</button>
  </div>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div class="header">
    <div>
      <div class="header-title">Quét hàng</div>
      <div style="font-size:12px;color:#888;" id="role-display"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="badge" id="role-badge"></span>
      <button class="logout-btn" onclick="doLogout()">Đăng xuất</button>
    </div>
  </div>

  <div id="video-container"></div>
  <div class="scan-hint" id="scan-hint" style="display:none;">Đưa mã QR vào khung hình để quét</div>

  <button class="btn-scan" id="btn-scan-main" onclick="toggleScan()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M14 17h3M17 14v3"/></svg>
    Quét mã QR
  </button>

  <div class="divider">— hoặc nhập mã thủ công —</div>
  <div class="manual-row">
    <input type="text" id="manual-code" placeholder="VD: IN001 hoặc tìm theo tên..." autocomplete="off" autocapitalize="characters" oninput="filterProductList()" />
    <button onclick="lookupManual()">Tìm</button>
  </div>

  <div id="product-list" style="margin-top:12px;"></div>
</div>

<!-- FORM -->
<div id="screen-form" class="screen">
  <div class="header">
    <button class="btn-back" onclick="goBack()">← Quay lại</button>
    <span class="badge" id="form-badge"></span>
  </div>

  <div class="card">
    <div class="product-name" id="form-name"></div>
    <div class="product-size" id="form-size"></div>
    <div class="info-row" id="row-nhanhieu" style="display:none;">
      <span class="info-label">Nhãn hiệu</span>
      <span class="info-value" id="form-nhanhieu"></span>
    </div>
    <div class="info-row" id="row-phanloai" style="display:none;">
      <span class="info-label">Phân loại</span>
      <span class="info-value" id="form-phanloai"></span>
    </div>
    <div class="info-row" id="row-giavon">
      <span class="info-label">Giá vốn</span>
      <span class="info-value red" id="form-giavon"></span>
    </div>
    <div class="info-row">
      <span class="info-label">Đơn vị tính</span>
      <span class="info-value" id="form-dvt"></span>
    </div>
    <div class="info-row">
      <span class="info-label">Tồn kho hiện tại</span>
      <span class="info-value green" id="form-tonkho"></span>
    </div>
  </div>

  <div class="card">
    <label>Nhập hay Xuất?</label>
    <div class="toggle-row">
      <button class="toggle-btn active-xuat" id="btn-xuat" onclick="setMode('Xuất')">📤 Xuất hàng</button>
      <button class="toggle-btn" id="btn-nhap" onclick="setMode('Nhập')">📥 Nhập hàng</button>
    </div>

    <label>Số lượng</label>
    <input type="text" id="form-soluong" placeholder="Nhập số lượng..." inputmode="numeric" oninput="fmtInput(this)" />

    <label id="label-gia">Giá bán (đồng)</label>
    <input type="text" id="form-gia" placeholder="Nhập giá..." inputmode="numeric" oninput="fmtInput(this)" />

    <label>Giao dịch <span style="color:#f44336;">*</span></label>
    <select id="form-giaodich">
      <option value="">-- Chọn hình thức --</option>
      <option value="Tiền mặt">💵 Tiền mặt</option>
      <option value="Chuyển khoản">🏦 Chuyển khoản</option>
    </select>

    <div id="row-phi-chanh" style="display:none;">
      <label>Phí chành xe (không bắt buộc)</label>
      <input type="text" id="form-phi-chanh" placeholder="Nhập phí..." inputmode="numeric" oninput="fmtInput(this)" />
    </div>

    <label>Ghi chú (không bắt buộc)</label>
    <input type="text" id="form-ghichu" placeholder="Tên khách, đơn hàng..." />

    <button class="btn-confirm xuat" id="btn-confirm" onclick="submitForm()">✅ Xác nhận Xuất hàng</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="screen-success" class="screen">
  <div class="success-wrap">
    <div class="success-circle">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-title" id="success-title">Ghi thành công!</div>
    <div class="success-sub" id="success-sub"></div>
  </div>
  <div class="card" id="success-detail"></div>
  <button class="btn-primary" onclick="goMain()" style="margin-top:1rem;">Tiếp tục</button>
</div>

<!-- MODAL -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:999;display:none;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:24px 20px;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
    <div style="font-size:28px;text-align:center;margin-bottom:10px;">⚠️</div>
    <div id="modal-msg" style="font-size:15px;font-weight:600;color:#1a1a1a;text-align:center;margin-bottom:6px;"></div>
    <div id="modal-sub" style="font-size:13px;color:#888;text-align:center;margin-bottom:20px;"></div>
    <div style="display:flex;gap:10px;">
      <button id="modal-no" style="flex:1;padding:13px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;font-weight:600;background:#fff;color:#555;cursor:pointer;">Không</button>
      <button id="modal-yes" style="flex:1;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;background:#f44336;color:#fff;cursor:pointer;">Vẫn xuất</button>
    </div>
  </div>
</div>

</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxuMnQQXseZ6YtZgv7bOR0V5v0700bq8Vn_kNgpMjAPDX6x8dFmxvWgDsn6ch8hp7dNdg/exec';

let currentRole = null;
let currentProduct = null;
let currentMode = 'Xuất';
let products = [];
let scanInterval = null;
let stream = null;
let scanning = false;
let usingFallbackProducts = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function doLogin() {
  const role = document.getElementById('login-role').value;
  const pass = document.getElementById('login-pass').value.trim();
  const err = document.getElementById('login-error');
  const loginBtn = document.querySelector('#screen-login .btn-primary');

  if (!pass) { err.style.display = 'block'; return; }

  loginBtn.innerHTML = '⏳ Đang đăng nhập...';
  loginBtn.disabled = true;

  try {
    const res = await fetch(`${SCRIPT_URL}?action=login&role=${role}&pass=${encodeURIComponent(pass)}`);
    const data = await res.json();

    if (data.ok) {
      currentRole = role;
      err.style.display = 'none';
      // ... phần còn lại giữ nguyên như cũ
      const isOwner = role === 'owner';
      document.getElementById('role-display').textContent = isOwner ? 'Chủ tiệm' : 'Nhân viên';
      document.getElementById('role-badge').textContent = isOwner ? 'Chủ' : 'Nhân viên';
      document.getElementById('role-badge').className = 'badge ' + (isOwner ? 'badge-owner' : 'badge-staff');
      await loadProducts();
      renderProductList(products);
      showScreen('screen-main');
    } else {
      err.style.display = 'block';
    }
  } catch(e) {
    alert('Lỗi kết nối, thử lại!');
  } finally {
    loginBtn.innerHTML = '🔐 Đăng nhập';
    loginBtn.disabled = false;
  }
}

document.getElementById('login-pass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  stopScan();
  currentRole = null;
  products = [];
  localStorage.removeItem('products_cache');
  document.getElementById('login-pass').value = '';
  showScreen('screen-login');
}

async function loadProducts() {
  usingFallbackProducts = false;

  // N\u1EBFu c\u00F3 cache, d\u00F9ng ngay v\u00E0 t\u1EA3i m\u1EDBi \u1EDF n\u1EC1n
  const cached = localStorage.getItem('products_cache');
  if (cached) {
    try {
      const parsed = JSON.parse(cached);
      if (parsed.length > 0) {
        products = parsed;
        fetchProductsFromServer().catch(() => {});
        return;
      }
    } catch(e) {}
  }

  // Ch\u01B0a c\u00F3 cache: t\u1EA3i v\u00E0 ch\u1EDD
  await fetchProductsFromServer();
}

async function fetchProductsFromServer() {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000);
    const res = await fetch(SCRIPT_URL + '?action=get', { signal: controller.signal, cache: 'no-store' });
    clearTimeout(timeoutId);
    const data = await res.json();
    const fetched = data.slice(1).map(r => ({
      ma: (r[0] || '').toString().trim(),
      nhanHieu: r[1] || '',
      phanloai: r[2] || '',
      ten: r[3] || '',
      kichthuoc: r[4] || '',
      giavon: r[5] || '',
      dvt: r[6] || 'Cái',
      tonkho: r[7] || 0
    })).filter(p => p.ma);
    if (fetched.length > 0) {
      products = fetched;
      localStorage.setItem('products_cache', JSON.stringify(products));
      renderProductList(products);
    }
  } catch(e) {
    if (products.length === 0) {
      usingFallbackProducts = true;
      products = [
        {ma:'IN001', nhanHieu:'', phanloai:'Bàn', ten:'Bàn Inox 304', kichthuoc:'50*80*75*1,5', giavon:'450.000 đ', dvt:'Cái', tonkho:10},
        {ma:'IN002', nhanHieu:'', phanloai:'Bàn', ten:'Bàn Inox 304', kichthuoc:'60*90*75*1,5', giavon:'500.000 đ', dvt:'Cái', tonkho:5},
        {ma:'IN003', nhanHieu:'', phanloai:'Kệ', ten:'Kệ Inox 304', kichthuoc:'100*120*100', giavon:'1.000.000 đ', dvt:'Cái', tonkho:8},
      ];
    }
  }
}

function showModal(msg, sub, onYes) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-sub').textContent = sub;
  overlay.style.display = 'flex';
  const yes = document.getElementById('modal-yes');
  const no = document.getElementById('modal-no');
  const close = () => { overlay.style.display = 'none'; };
  yes.onclick = () => { close(); onYes(); };
  no.onclick = close;
  overlay.onclick = (e) => { if (e.target === overlay) close(); };
}

function parseNum(val) {
  if (typeof val === 'number') return val;
  return parseInt((val || '').toString().replace(/[^0-9]/g, '')) || 0;
}

function fmtInput(el) {
  const pos = el.selectionStart;
  const oldLen = el.value.length;
  const raw = el.value.replace(/[^0-9]/g, '');
  const formatted = raw ? Number(raw).toLocaleString('en-US') : '';
  el.value = formatted;
  // gi\u1EEF v\u1ECB tr\u00ED con tr\u1ECF
  const diff = formatted.length - oldLen;
  el.setSelectionRange(pos + diff, pos + diff);
}

function getInputNum(id) {
  return parseInt((document.getElementById(id).value || '').replace(/[^0-9]/g, '')) || 0;
}

function fmt(n) {
  return Number(n || 0).toLocaleString('en-US');
}

function fmtMoney(val) {
  if (typeof val === 'string') {
    const num = parseFloat(val.replace(/[^\d]/g, ''));
    return isNaN(num) ? val : num.toLocaleString('en-US') + ' \u0111';
  }
  return Number(val || 0).toLocaleString('en-US') + ' \u0111';
}

function findProduct(code) {
  return products.find(p => p.ma === code.trim().toUpperCase());
}

function renderProductList(list) {
  const el = document.getElementById('product-list');
  if (!list || list.length === 0) {
    el.innerHTML = '<div class="loading">Kh\u00F4ng t\u00ECm th\u1EA5y s\u1EA3n ph\u1EA9m</div>';
    return;
  }
  el.innerHTML = list.map(p => {
    const low = (p.tonkho || 0) <= 3;
    return `<div class="product-item" onclick="showForm(products.find(x=>x.ma==='${p.ma}'))">
      <div class="product-item-left">
        <div class="product-item-ma">${p.ma}${p.phanloai ? ' · ' + p.phanloai : ''}${p.nhanHieu ? ' · ' + p.nhanHieu : ''}</div>
        <div class="product-item-ten">${p.ten}</div>
        <div class="product-item-size">${p.kichthuoc}</div>
      </div>
      <div class="product-item-right">
        <div class="product-item-tonkho${low ? ' low' : ''}">T\u1ED3n: ${fmt(p.tonkho)}</div>
        <div style="font-size:11px;color:#aaa;">${p.dvt}</div>
      </div>
    </div>`;
  }).join('');
}

function removeDiacritics(str) {
  return (str || '').normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D').toLowerCase();
}

function filterProductList() {
  const q = removeDiacritics(document.getElementById('manual-code').value || '').trim();
  if (!q) { renderProductList(products); return; }
  const filtered = products.filter(p =>
    removeDiacritics(p.ma).includes(q) ||
    removeDiacritics(p.ten).includes(q) ||
    removeDiacritics(p.kichthuoc).includes(q) ||
    removeDiacritics(p.phanloai).includes(q) ||
    removeDiacritics(p.nhanHieu).includes(q)
  );
  renderProductList(filtered);
}

function showForm(product) {
  currentProduct = product;
  document.getElementById('form-name').textContent = product.ten;
  document.getElementById('form-size').textContent = 'Kích thước: ' + product.kichthuoc + '  |  Mã: ' + product.ma;
  if (product.nhanHieu) {
    document.getElementById('row-nhanhieu').style.display = 'flex';
    document.getElementById('form-nhanhieu').textContent = product.nhanHieu;
  } else {
    document.getElementById('row-nhanhieu').style.display = 'none';
  }
  if (product.phanloai) {
    document.getElementById('row-phanloai').style.display = 'flex';
    document.getElementById('form-phanloai').textContent = product.phanloai;
  } else {
    document.getElementById('row-phanloai').style.display = 'none';
  }
  if (product.phanloai) {
    document.getElementById('row-phanloai').style.display = 'flex';
    document.getElementById('form-phanloai').textContent = product.phanloai;
  } else {
    document.getElementById('row-phanloai').style.display = 'none';
  }
  document.getElementById('form-dvt').textContent = product.dvt;
  document.getElementById('form-tonkho').textContent = fmt(product.tonkho) + ' ' + product.dvt;
  const isOwner = currentRole === 'owner';
  document.getElementById('form-badge').textContent = isOwner ? 'Chủ' : 'Nhân viên';
  document.getElementById('form-badge').className = 'badge ' + (isOwner ? 'badge-owner' : 'badge-staff');
  document.getElementById('row-giavon').style.display = isOwner ? 'flex' : 'none';
  document.getElementById('form-giavon').textContent = fmtMoney(product.giavon);
  document.getElementById('btn-nhap').style.display = isOwner ? 'block' : 'none';
  document.getElementById('form-soluong').value = '';
  document.getElementById('form-gia').value = '';
  document.getElementById('form-giaodich').value = '';
  document.getElementById('form-phi-chanh').value = '';
  document.getElementById('form-ghichu').value = '';
  setMode('Xuất');
  showScreen('screen-form');
}

function setMode(mode) {
  currentMode = mode;
  const bx = document.getElementById('btn-xuat');
  const bn = document.getElementById('btn-nhap');
  const lbl = document.getElementById('label-gia');
  const bc = document.getElementById('btn-confirm');
  const phiRow = document.getElementById('row-phi-chanh');
  if (mode === 'Xuất') {
    bx.className = 'toggle-btn active-xuat';
    bn.className = 'toggle-btn';
    lbl.textContent = 'Giá bán (đồng)';
    bc.textContent = '✅ Xác nhận Xuất hàng';
    bc.className = 'btn-confirm xuat';
    phiRow.style.display = 'block';
  } else {
    bn.className = 'toggle-btn active-nhap';
    bx.className = 'toggle-btn';
    lbl.textContent = 'Giá nhập (đồng)';
    bc.textContent = '✅ Xác nhận Nhập hàng';
    bc.className = 'btn-confirm';
    phiRow.style.display = 'none';
    document.getElementById('form-phi-chanh').value = '';
  }
}

async function submitForm() {
  const sl = getInputNum('form-soluong');
  const gia = getInputNum('form-gia');
  const giaodich = document.getElementById('form-giaodich').value;
  const phiChanh = getInputNum('form-phi-chanh');
  const ghichu = document.getElementById('form-ghichu').value;

  if (currentMode === 'Xuất') {
    const tonkho = Number(currentProduct.tonkho) || 0;
    if (tonkho <= 0) {
      showModal('Hết hàng!', 'Sản phẩm này hiện không còn tồn kho để xuất.', () => {});
      document.getElementById('modal-yes').style.display = 'none';
      document.getElementById('modal-no').textContent = 'Đóng';
      return;
    }
    if (sl > tonkho) {
      showModal('Số lượng vượt tồn kho!', 'Tồn kho hiện tại: ' + fmt(tonkho) + ' ' + currentProduct.dvt + '. Không thể xuất ' + fmt(sl) + '.', () => {});
      document.getElementById('modal-yes').style.display = 'none';
      document.getElementById('modal-no').textContent = 'Đóng';
      return;
    }
  }

  if (!sl || sl <= 0) {
    document.getElementById('form-soluong').focus();
    showModal('Thiếu thông tin!', 'Vui lòng nhập Số lượng.', () => {});
    document.getElementById('modal-yes').style.display = 'none';
    document.getElementById('modal-no').textContent = 'Đóng';
    return;
  }
  if (!gia || gia <= 0) {
    document.getElementById('form-gia').focus();
    showModal('Thiếu thông tin!', currentMode === 'Xuất' ? 'Vui lòng nhập Giá bán.' : 'Vui lòng nhập Giá nhập.', () => {});
    document.getElementById('modal-yes').style.display = 'none';
    document.getElementById('modal-no').textContent = 'Đóng';
    return;
  }
  if (!giaodich) {
    document.getElementById('form-giaodich').focus();
    showModal('Thiếu thông tin!', 'Vui lòng chọn hình thức Giao dịch.', () => {});
    document.getElementById('modal-yes').style.display = 'none';
    document.getElementById('modal-no').textContent = 'Đóng';
    return;
  }

  if (currentMode === 'Xuất') {
    const giavon = parseNum(currentProduct.giavon);
    if (giavon > 0 && gia < giavon) {
      const sub = currentRole === 'owner'
        ? 'Giá vốn: ' + fmt(giavon) + ' đ  •  Giá bán: ' + fmt(gia) + ' đ'
        : 'Giá bán có thể thấp. Bạn có chắc muốn tiếp tục?';
      showModal('Giá bán thấp hơn giá vốn!', sub, () => doSubmit(sl, gia, giaodich, ghichu, phiChanh));
      return;
    }
  }
  doSubmit(sl, gia, giaodich, ghichu, phiChanh);
}

async function doSubmit(sl, gia, giaodich, ghichu, phiChanh) {

  const btn = document.getElementById('btn-confirm');
  btn.textContent = '⏳ Đang ghi...';
  btn.disabled = true;

  const now = new Date();
  const thoiGian = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const sheetName = currentMode === 'Xuất' ? 'Xuất' : 'Nhập';
  const row = [currentProduct.ma, thoiGian, currentProduct.nhanHieu || '', currentProduct.phanloai || '', currentProduct.ten, currentProduct.kichthuoc, currentProduct.dvt, sl, gia, giaodich, phiChanh || '', ghichu];

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sheet: sheetName, row: row })
    });
  } catch(e) {}

  btn.disabled = false;

  const isXuat = currentMode === 'Xuất';
  document.getElementById('success-title').textContent = isXuat ? '📤 Xuất hàng thành công!' : '📥 Nhập hàng thành công!';
  document.getElementById('success-sub').textContent = thoiGian;
  document.getElementById('success-detail').innerHTML = `
    <div class="info-row"><span class="info-label">Sản phẩm</span><span class="info-value">${currentProduct.ten}</span></div>
    <div class="info-row"><span class="info-label">Kích thước</span><span class="info-value">${currentProduct.kichthuoc}</span></div>
    <div class="info-row"><span class="info-label">Số lượng</span><span class="info-value">${fmt(sl)} ${currentProduct.dvt}</span></div>
    <div class="info-row"><span class="info-label">${isXuat ? 'Giá bán' : 'Giá nhập'}</span><span class="info-value">${fmt(gia)} đ</span></div>
    <div class="info-row"><span class="info-label">Giao dịch</span><span class="info-value">${giaodich}</span></div>
    ${isXuat && phiChanh > 0 ? `<div class="info-row"><span class="info-label">Phí chành xe</span><span class="info-value">${fmt(phiChanh)} đ</span></div>` : ''}
    ${ghichu ? `<div class="info-row"><span class="info-label">Ghi chú</span><span class="info-value">${ghichu}</span></div>` : ''}
  `;
  showScreen('screen-success');
}

function goBack() {
  stopScan();
  showScreen('screen-main');
}

function goMain() {
  showScreen('screen-main');
}

function lookupManual() {
  const code = document.getElementById('manual-code').value;
  if (!code) return;
  const p = findProduct(code);
  if (p) {
    document.getElementById('manual-code').value = '';
    showForm(p);
  } else {
    alert('Không tìm thấy mã sản phẩm: ' + code.toUpperCase());
  }
}

document.getElementById('manual-code').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') lookupManual();
});

let html5QrCode = null;

async function toggleScan() {
  if (scanning) { stopScan(); return; }
  const btn = document.getElementById('btn-scan-main');
  const container = document.getElementById('video-container');
  scanning = true;
  container.style.display = 'block';
  document.getElementById('scan-hint').style.display = 'block';
  btn.textContent = '\u23F9 D\u1EEBng qu\u00E9t';

  html5QrCode = new Html5Qrcode('video-container');
  try {
    await html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 15, qrbox: { width: 280, height: 280 }, aspectRatio: 1.0 },
      (decodedText) => {
        const trimmed = decodedText.trim().toUpperCase();
        stopScan();
        const p = findProduct(trimmed);
        if (p) { showForm(p); }
        else { alert('Kh\u00F4ng t\u00ECm th\u1EA5y s\u1EA3n ph\u1EA9m v\u1EDBi m\u00E3: ' + trimmed); }
      },
      () => {}
    );
  } catch(e) {
    scanning = false;
    container.style.display = 'none';
    document.getElementById('scan-hint').style.display = 'none';
    btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M14 17h3M17 14v3"/></svg> Qu\u00E9t m\u00E3 QR';
    alert('Kh\u00F4ng m\u1EDF \u0111\u01B0\u1EE3c camera. Th\u1EED d\u00F9ng nh\u1EADp m\u00E3 th\u1EE7 c\u00F4ng b\u00EAn d\u01B0\u1EDBi.');
  }
}

function stopScan() {
  scanning = false;
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      html5QrCode.clear();
      html5QrCode = null;
    }).catch(() => { html5QrCode = null; });
  }
  document.getElementById('video-container').style.display = 'none';
  document.getElementById('scan-hint').style.display = 'none';
  const btn = document.getElementById('btn-scan-main');
  if (btn) btn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M14 17h3M17 14v3"/></svg> Qu\u00E9t m\u00E3 QR';
}
</script>
